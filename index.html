function getAllChannels(str) {
  const list = [];
  str.forEach((dept) => {
    list.push({ ...dept, isParent: true, children: undefined });
    if (dept.children) {
      dept.children.forEach((child) => {
        list.push({ ...child, isParent: false, parentId: dept.id, parentName: dept.name });
      });
    }
  });
  return list;
}

                    <div key={p.name} style={{ background: "white", borderRadius: 8, padding: 16, border: "1px solid #E8E5E0" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                        <div style={{ fontSize: 13, fontWeight: 600, color: "#37352F", fontFamily: "sans-serif", lineHeight: 1.3 }}>{p.name}</div>
                        <span style={{ fontSize: 11, padding: "2px 8px", borderRadius: 20, background: s.bg, color: s.color, fontFamily: "sans-serif", fontWeight: 600, flexShrink: 0, marginLeft: 8 }}>{p.status}</span>
                      </div>
                      <div style={{ height: 4, background: "#F0EEE9", borderRadius: 4, overflow: "hidden" }}>
                        <div style={{ height: "100%", width: `${p.progress}%`, background: dept.color, borderRadius: 4 }} />
                      </div>
                      <div style={{ display: "flex", justifyContent: "space-between", marginTop: 6 }}>
                        <span style={{ fontSize: 11, color: "#9B9A97", fontFamily: "sans-serif" }}>{p.progress}% complete</span>
                        <span style={{ fontSize: 11, color: "#9B9A97", fontFamily: "sans-serif" }}>Due {p.due}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {activeTab === "capabilities" && (
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
              <div style={{ background: "white", borderRadius: 8, padding: 24, border: "1px solid #E8E5E0" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 16 }}>
                  <div style={{ width: 20, height: 20, borderRadius: 4, background: dept.color, display: "flex", alignItems: "center", justifyContent: "center" }}>
                    <span style={{ fontSize: 11, color: "white" }}>✓</span>
                  </div>
                  <span style={{ fontSize: 13, fontWeight: 700, fontFamily: "sans-serif", color: "#37352F" }}>What we can do</span>
                </div>
                {dept.capabilities.map((c) => (
                  <div key={c} style={{ display: "flex", gap: 10, marginBottom: 12, alignItems: "flex-start" }}>
                    <div style={{ width: 6, height: 6, borderRadius: "50%", background: dept.color, marginTop: 6, flexShrink: 0 }} />
                    <span style={{ fontSize: 13, color: "#37352F", fontFamily: "sans-serif", lineHeight: 1.5 }}>{c}</span>
                  </div>
                ))}
              </div>
              <div style={{ background: "white", borderRadius: 8, padding: 24, border: "1px solid #E8E5E0" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 16 }}>
                  <div style={{ width: 20, height: 20, borderRadius: 4, background: "#F1F0EE", display: "flex", alignItems: "center", justifyContent: "center" }}>
                    <span style={{ fontSize: 11, color: "#9B9A97" }}>—</span>
                  </div>
                  <span style={{ fontSize: 13, fontWeight: 700, fontFamily: "sans-serif", color: "#37352F" }}>Limitations & scope</span>
                </div>
                {dept.limitations.map((l) => (
                  <div key={l} style={{ display: "flex", gap: 10, marginBottom: 12, alignItems: "flex-start" }}>
                    <div style={{ width: 6, height: 6, borderRadius: "50%", background: "#D0CECC", marginTop: 6, flexShrink: 0 }} />
                    <span style={{ fontSize: 13, color: "#6B6B6B", fontFamily: "sans-serif", lineHeight: 1.5 }}>{l}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {activeTab === "projects" && (
            <div style={{ background: "white", borderRadius: 8, border: "1px solid #E8E5E0", overflow: "hidden" }}>
              <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr 80px", padding: "10px 20px", borderBottom: "1px solid #E8E5E0", background: "#FBFAF9" }}>
                {["Project", "Status", "Progress", "Due"].map((h) => (
                  <div key={h} style={{ fontSize: 11, fontWeight: 700, color: "#9B9A97", textTransform: "uppercase", letterSpacing: "0.06em", fontFamily: "sans-serif" }}>{h}</div>
                ))}
              </div>
              {dept.projects.map((p, i) => {
                const s = statusConfig[p.status];
                return (
                  <div key={p.name}
                    style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr 80px", padding: "14px 20px", alignItems: "center", borderBottom: i < dept.projects.length - 1 ? "1px solid #F0EEE9" : "none" }}
                    onMouseEnter={(e) => e.currentTarget.style.background = "#FAFAF8"}
                    onMouseLeave={(e) => e.currentTarget.style.background = "transparent"}
                  >
                    <div style={{ fontSize: 13, fontWeight: 500, color: "#37352F", fontFamily: "sans-serif" }}>{p.name}</div>
                    <div><span style={{ fontSize: 11, padding: "3px 10px", borderRadius: 20, background: s.bg, color: s.color, fontFamily: "sans-serif", fontWeight: 600 }}>{p.status}</span></div>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <div style={{ flex: 1, height: 4, background: "#F0EEE9", borderRadius: 4, maxWidth: 100 }}>
                        <div style={{ height: "100%", width: `${p.progress}%`, background: dept.color, borderRadius: 4 }} />
                      </div>
                      <span style={{ fontSize: 11, color: "#9B9A97", fontFamily: "sans-serif", minWidth: 28 }}>{p.progress}%</span>
                    </div>
                    <div style={{ fontSize: 12, color: "#9B9A97", fontFamily: "sans-serif" }}>{p.due}</div>
                  </div>
                );
              })}
            </div>
          )}

          {activeTab === "team" && (
            <div style={{ background: "white", borderRadius: 8, border: "1px solid #E8E5E0", overflow: "hidden" }}>
              <div style={{ display: "grid", gridTemplateColumns: "2fr 2fr 2fr", padding: "10px 20px", borderBottom: "1px solid #E8E5E0", background: "#FBFAF9" }}>
                {["Name", "Title", "Email"].map((h) => (
                  <div key={h} style={{ fontSize: 11, fontWeight: 700, color: "#9B9A97", textTransform: "uppercase", letterSpacing: "0.06em", fontFamily: "sans-serif" }}>{h}</div>
                ))}
              </div>
              {dept.team && dept.team.map((m, i) => (
                <div key={i} style={{
                  display: "grid", gridTemplateColumns: "2fr 2fr 2fr", padding: "13px 20px", alignItems: "center",
                  borderBottom: i < dept.team.length - 1 ? "1px solid #F0EEE9" : "none",
                  background: m.isLead ? dept.color + "08" : "transparent",
                }}
                  onMouseEnter={(e) => e.currentTarget.style.background = m.isLead ? dept.color + "12" : "#FAFAF8"}
                  onMouseLeave={(e) => e.currentTarget.style.background = m.isLead ? dept.color + "08" : "transparent"}
                >
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <div style={{ width: 28, height: 28, borderRadius: "50%", background: m.isLead ? dept.color : "#E8E5E0", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                      <span style={{ fontSize: 11, fontWeight: 700, color: m.isLead ? "white" : "#9B9A97", fontFamily: "sans-serif" }}>
                        {m.name === "Name" ? "?" : m.name.split(" ").map(n => n[0]).join("").slice(0,2)}
                      </span>
                    </div>
                    <div>
                      <span style={{ fontSize: 13, fontWeight: m.isLead ? 700 : 500, color: "#37352F", fontFamily: "sans-serif" }}>{m.name}</span>
                      {m.isLead && <span style={{ marginLeft: 6, fontSize: 10, padding: "1px 6px", borderRadius: 10, background: dept.color, color: "white", fontFamily: "sans-serif", fontWeight: 600 }}>Lead</span>}
                    </div>
                  </div>
                  <div style={{ fontSize: 13, color: "#6B6B6B", fontFamily: "sans-serif" }}>{m.title}</div>
                  <div>
                    <a href={`mailto:${m.email}`} style={{ fontSize: 13, color: dept.color, fontFamily: "sans-serif", textDecoration: "none" }}
                      onMouseEnter={(e) => e.target.style.textDecoration = "underline"}
                      onMouseLeave={(e) => e.target.style.textDecoration = "none"}
                    >{m.email}</a>
                  </div>
                </div>
              ))}
            </div>
          )}

        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
