const F = "'Archivo', sans-serif";

function getAllChannels(str) {
  const list = [];
  str.forEach((dept) => {
    list.push({ ...dept, isParent: true, children: undefined });
    if (dept.children) dept.children.forEach((child) => list.push({ ...child, isParent: false, parentId: dept.id, parentName: dept.name }));
  });
  return list;
}

                    <div key={p.name} style={{ background: "#FFFFFF", borderRadius: 12, padding: 22, border: "1px solid #E5E7EB" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 }}>
                        <div style={{ fontSize: 14, fontWeight: 700, color: "#111827", fontFamily: F, lineHeight: 1.4 }}>{p.name}</div>
                        <span style={{ fontSize: 11, padding: "3px 10px", borderRadius: 6, background: s.bg, color: s.color, fontFamily: F, fontWeight: 700, flexShrink: 0, marginLeft: 12 }}>{p.status}</span>
                      </div>
                      <div style={{ height: 5, background: "#F3F4F6", borderRadius: 99, overflow: "hidden" }}>
                        <div style={{ height: "100%", width: `${p.progress}%`, background: dept.color, borderRadius: 99 }} />
                      </div>
                      <div style={{ display: "flex", justifyContent: "space-between", marginTop: 10 }}>
                        <span style={{ fontSize: 12, color: "#9CA3AF", fontFamily: F, fontWeight: 500 }}>{p.progress}% complete</span>
                        <span style={{ fontSize: 12, color: "#9CA3AF", fontFamily: F, fontWeight: 500 }}>Due {p.due}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {activeTab === "capabilities" && (
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 24 }}>
              <div style={{ background: "#F9FAFB", borderRadius: 12, padding: 30, border: "1px solid #E5E7EB" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 24 }}>
                  <div style={{ width: 24, height: 24, borderRadius: 6, background: dept.color, display: "flex", alignItems: "center", justifyContent: "center" }}>
                    <span style={{ fontSize: 12, color: "white", fontWeight: 800 }}>✓</span>
                  </div>
                  <span style={{ fontSize: 14, fontWeight: 800, fontFamily: F, color: "#111827" }}>What we can do</span>
                </div>
                {dept.capabilities.map((c) => (
                  <div key={c} style={{ display: "flex", gap: 12, marginBottom: 16, alignItems: "flex-start" }}>
                    <div style={{ width: 7, height: 7, borderRadius: "50%", background: dept.color, marginTop: 8, flexShrink: 0 }} />
                    <span style={{ fontSize: 14, color: "#374151", fontFamily: F, lineHeight: 1.65, fontWeight: 400 }}>{c}</span>
                  </div>
                ))}
              </div>
              <div style={{ background: "#F9FAFB", borderRadius: 12, padding: 30, border: "1px solid #E5E7EB" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 24 }}>
                  <div style={{ width: 24, height: 24, borderRadius: 6, background: "#E5E7EB", display: "flex", alignItems: "center", justifyContent: "center" }}>
                    <span style={{ fontSize: 13, color: "#9CA3AF", fontWeight: 800 }}>—</span>
                  </div>
                  <span style={{ fontSize: 14, fontWeight: 800, fontFamily: F, color: "#111827" }}>Limitations & scope</span>
                </div>
                {dept.limitations.map((l) => (
                  <div key={l} style={{ display: "flex", gap: 12, marginBottom: 16, alignItems: "flex-start" }}>
                    <div style={{ width: 7, height: 7, borderRadius: "50%", background: "#D1D5DB", marginTop: 8, flexShrink: 0 }} />
                    <span style={{ fontSize: 14, color: "#6B7280", fontFamily: F, lineHeight: 1.65, fontWeight: 400 }}>{l}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {activeTab === "projects" && (
            <div style={{ background: "#FFFFFF", borderRadius: 12, border: "1px solid #E5E7EB", overflow: "hidden" }}>
              <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr 80px", padding: "13px 26px", borderBottom: "1px solid #E5E7EB", background: "#F9FAFB" }}>
                {["Project", "Status", "Progress", "Due"].map((h) => (
                  <div key={h} style={{ fontSize: 11, fontWeight: 700, color: "#9CA3AF", textTransform: "uppercase", letterSpacing: "0.08em", fontFamily: F }}>{h}</div>
                ))}
              </div>
              {dept.projects.map((p, i) => {
                const s = statusConfig[p.status];
                return (
                  <div key={p.name}
                    style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr 80px", padding: "18px 26px", alignItems: "center", borderBottom: i < dept.projects.length - 1 ? "1px solid #F3F4F6" : "none", transition: "background 0.1s" }}
                    onMouseEnter={(e) => e.currentTarget.style.background = "#F9FAFB"}
                    onMouseLeave={(e) => e.currentTarget.style.background = "transparent"}
                  >
                    <div style={{ fontSize: 14, fontWeight: 600, color: "#111827", fontFamily: F }}>{p.name}</div>
                    <div><span style={{ fontSize: 11, padding: "4px 10px", borderRadius: 6, background: s.bg, color: s.color, fontFamily: F, fontWeight: 700 }}>{p.status}</span></div>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <div style={{ flex: 1, height: 5, background: "#F3F4F6", borderRadius: 99, maxWidth: 100 }}>
                        <div style={{ height: "100%", width: `${p.progress}%`, background: dept.color, borderRadius: 99 }} />
                      </div>
                      <span style={{ fontSize: 12, color: "#9CA3AF", fontFamily: F, fontWeight: 500, minWidth: 30 }}>{p.progress}%</span>
                    </div>
                    <div style={{ fontSize: 13, color: "#6B7280", fontFamily: F, fontWeight: 500 }}>{p.due}</div>
                  </div>
                );
              })}
            </div>
          )}

          {activeTab === "team" && (
            <div style={{ background: "#FFFFFF", borderRadius: 12, border: "1px solid #E5E7EB", overflow: "hidden" }}>
              <div style={{ display: "grid", gridTemplateColumns: "2fr 2fr 2fr", padding: "13px 26px", borderBottom: "1px solid #E5E7EB", background: "#F9FAFB" }}>
                {["Name", "Title", "Email"].map((h) => (
                  <div key={h} style={{ fontSize: 11, fontWeight: 700, color: "#9CA3AF", textTransform: "uppercase", letterSpacing: "0.08em", fontFamily: F }}>{h}</div>
                ))}
              </div>
              {dept.team && dept.team.map((m, i) => (
                <div key={i} style={{
                  display: "grid", gridTemplateColumns: "2fr 2fr 2fr", padding: "16px 26px", alignItems: "center",
                  borderBottom: i < dept.team.length - 1 ? "1px solid #F3F4F6" : "none",
                  background: m.isLead ? dept.color + "08" : "transparent", transition: "background 0.1s",
                }}
                  onMouseEnter={(e) => e.currentTarget.style.background = m.isLead ? dept.color + "12" : "#F9FAFB"}
                  onMouseLeave={(e) => e.currentTarget.style.background = m.isLead ? dept.color + "08" : "transparent"}
                >
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <div style={{ width: 32, height: 32, borderRadius: "50%", background: m.isLead ? dept.color : "#E5E7EB", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                      <span style={{ fontSize: 11, fontWeight: 800, color: m.isLead ? "white" : "#9CA3AF", fontFamily: F }}>
                        {m.name === "Name" ? "?" : m.name.split(" ").map(n => n[0]).join("").slice(0, 2)}
                      </span>
                    </div>
                    <div>
                      <span style={{ fontSize: 14, fontWeight: m.isLead ? 800 : 600, color: "#111827", fontFamily: F }}>{m.name}</span>
                      {m.isLead && <span style={{ marginLeft: 7, fontSize: 10, padding: "2px 7px", borderRadius: 5, background: dept.color, color: "white", fontFamily: F, fontWeight: 700 }}>Lead</span>}
                    </div>
                  </div>
                  <div style={{ fontSize: 13, color: "#6B7280", fontFamily: F }}>{m.title}</div>
                  <a href={`mailto:${m.email}`} style={{ fontSize: 13, color: dept.color, fontFamily: F, textDecoration: "none", fontWeight: 500 }}
                    onMouseEnter={(e) => e.target.style.textDecoration = "underline"}
                    onMouseLeave={(e) => e.target.style.textDecoration = "none"}
                  >{m.email}</a>
                </div>
              ))}
            </div>
          )}

        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
