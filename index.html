<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Company Channels</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F7F6F3; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #D0CECC; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">

const departments = [
  {
    id: "engineering",
    emoji: "⚙️",
    name: "Engineering",
    color: "#2D6BE4",
    tagline: "Building the backbone of our product",
    overview: "The Engineering department designs, develops, and maintains all technical infrastructure and software products. We operate in two-week sprints using Agile methodology and own everything from architecture decisions to deployment pipelines.",
    capabilities: [
      "Full-stack web & mobile development",
      "Cloud infrastructure (AWS/GCP)",
      "CI/CD pipeline management",
      "System architecture & scalability",
      "API design and integrations",
      "Security & compliance audits",
    ],
    limitations: [
      "Design/UX is owned by Product Design",
      "Data science models handled by Data team",
      "Average 2-sprint lead time for new feature requests",
    ],
    projects: [
      { name: "Platform v3.0 Rebuild", status: "In Progress", progress: 68, due: "Apr 15" },
      { name: "Auth & SSO Overhaul", status: "Review", progress: 90, due: "Mar 20" },
      { name: "API Rate Limiting", status: "Completed", progress: 100, due: "Mar 1" },
      { name: "Mobile App Beta", status: "Planning", progress: 15, due: "Jun 1" },
    ],
  },
  {
    id: "product",
    emoji: "🧭",
    name: "Product",
    color: "#7C3AED",
    tagline: "Shaping what we build and why",
    overview: "Product manages the full lifecycle of our product — from discovery and roadmap planning to launch and iteration. We serve as the bridge between customer insights, business goals, and engineering execution.",
    capabilities: [
      "Product roadmap & strategy",
      "User research & journey mapping",
      "Feature prioritization (RICE/ICE frameworks)",
      "Go-to-market coordination",
      "OKR tracking and reporting",
      "Stakeholder alignment",
    ],
    limitations: [
      "Cannot approve engineering timelines unilaterally",
      "Requires legal sign-off for compliance-adjacent features",
      "Market research budget capped at $10k/quarter",
    ],
    projects: [
      { name: "Q2 Roadmap Finalization", status: "In Progress", progress: 55, due: "Mar 25" },
      { name: "Onboarding Redesign", status: "In Progress", progress: 40, due: "Apr 30" },
      { name: "Pricing Tier Review", status: "Planning", progress: 10, due: "May 15" },
      { name: "Customer Advisory Board", status: "Completed", progress: 100, due: "Mar 5" },
    ],
  },
  {
    id: "marketing",
    emoji: "📣",
    name: "Marketing",
    color: "#D97706",
    tagline: "Growing our reach and brand presence",
    overview: "Marketing drives brand awareness, demand generation, and customer acquisition. We own all external communications, campaigns, and content strategy across digital and offline channels.",
    capabilities: [
      "Brand identity & guidelines",
      "SEO/SEM & paid media",
      "Content marketing & thought leadership",
      "Email campaigns & automation",
      "Event planning & sponsorships",
      "Social media management",
    ],
    limitations: [
      "PR & crisis comms handled by external agency",
      "Product copy requires Product team approval",
      "Campaign budgets approved quarterly by Finance",
    ],
    projects: [
      { name: "Spring Campaign Launch", status: "In Progress", progress: 72, due: "Mar 31" },
      { name: "Brand Refresh", status: "Review", progress: 88, due: "Mar 18" },
      { name: "Podcast Series", status: "Planning", progress: 20, due: "May 1" },
      { name: "SEO Content Overhaul", status: "In Progress", progress: 45, due: "Apr 20" },
    ],
  },
  {
    id: "design",
    emoji: "🎨",
    name: "Product Design",
    color: "#DB2777",
    tagline: "Crafting intuitive and beautiful experiences",
    overview: "Product Design is responsible for the end-to-end user experience across all product surfaces. We work closely with Product and Engineering to ensure that every interaction is intentional, accessible, and delightful.",
    capabilities: [
      "UX research & usability testing",
      "Wireframing & prototyping (Figma)",
      "Design system ownership",
      "Accessibility (WCAG 2.1 AA)",
      "Motion design & micro-interactions",
      "Visual & brand design support",
    ],
    limitations: [
      "Capacity limited to 3 major projects per quarter",
      "Developer handoff requires Eng sprint buy-in",
      "Illustration/3D assets outsourced",
    ],
    projects: [
      { name: "Design System 2.0", status: "In Progress", progress: 60, due: "Apr 10" },
      { name: "Mobile UX Overhaul", status: "In Progress", progress: 35, due: "May 20" },
      { name: "Dashboard Redesign", status: "Review", progress: 95, due: "Mar 15" },
      { name: "Accessibility Audit", status: "Completed", progress: 100, due: "Feb 28" },
    ],
  },
  {
    id: "data",
    emoji: "📊",
    name: "Data & Analytics",
    color: "#059669",
    tagline: "Turning data into decisions",
    overview: "Data & Analytics owns the collection, modeling, and communication of data across the company. We provide the insights that guide product, marketing, and executive decisions — and build the infrastructure that makes it possible.",
    capabilities: [
      "Data warehouse management (Snowflake)",
      "BI dashboards (Looker/Tableau)",
      "ML model development",
      "A/B testing & experimentation",
      "Data governance & quality",
      "Custom reporting & analysis",
    ],
    limitations: [
      "PII data access governed by strict SOC 2 controls",
      "Real-time data requires Eng collaboration",
      "ML production deployment owned by Engineering",
    ],
    projects: [
      { name: "Churn Prediction Model", status: "In Progress", progress: 50, due: "Apr 25" },
      { name: "Unified Data Warehouse", status: "In Progress", progress: 78, due: "Mar 28" },
      { name: "Executive KPI Dashboard", status: "Completed", progress: 100, due: "Mar 1" },
      { name: "Experimentation Framework", status: "Planning", progress: 5, due: "Jun 15" },
    ],
  },
  {
    id: "operations",
    emoji: "🔧",
    name: "Operations",
    color: "#475569",
    tagline: "Keeping the engine running smoothly",
    overview: "Operations ensures the company runs efficiently by managing internal processes, vendor relationships, legal compliance, and financial planning. We're the connective tissue between all departments.",
    capabilities: [
      "Budget planning & financial controls",
      "Vendor & contract management",
      "Legal & compliance oversight",
      "HR & people operations",
      "IT infrastructure & tooling",
      "Office & remote ops management",
    ],
    limitations: [
      "External legal counsel for litigation",
      "Payroll processed through third-party (Rippling)",
      "Capital expenditures >$50k require board approval",
    ],
    projects: [
      { name: "Q2 Budget Planning", status: "In Progress", progress: 62, due: "Mar 22" },
      { name: "Vendor Contract Renewals", status: "In Progress", progress: 80, due: "Mar 31" },
      { name: "Employee Handbook Update", status: "Review", progress: 92, due: "Mar 16" },
      { name: "SOC 2 Type II Audit", status: "Planning", progress: 25, due: "Jul 1" },
    ],
  },
];

const statusConfig = {
  "In Progress": { color: "#2D6BE4", bg: "#EFF4FF" },
  "Review":      { color: "#D97706", bg: "#FFFBEB" },
  "Completed":   { color: "#059669", bg: "#ECFDF5" },
  "Planning":    { color: "#7C3AED", bg: "#F5F3FF" },
};

function App() {
  const [activeChannel, setActiveChannel] = React.useState(departments[0].id);
  const [activeTab, setActiveTab] = React.useState("overview");

  const dept = departments.find((d) => d.id === activeChannel);

  const selectDept = (id) => {
    setActiveChannel(id);
    setActiveTab("overview");
  };

  return (
    <div style={{ fontFamily: "Georgia, serif", display: "flex", height: "100vh", background: "#F7F6F3", color: "#37352F" }}>

      {/* Sidebar */}
      <div style={{ width: 240, background: "#FBFAF9", borderRight: "1px solid #E8E5E0", display: "flex", flexDirection: "column", padding: "16px 0", flexShrink: 0 }}>
        <div style={{ padding: "0 16px 16px", borderBottom: "1px solid #E8E5E0", marginBottom: 8 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: "#37352F", letterSpacing: "-0.3px" }}>Acme Corp</div>
          <div style={{ fontSize: 11, color: "#9B9A97", marginTop: 2, fontFamily: "sans-serif" }}>Company Channels</div>
        </div>
        <div style={{ padding: "4px 8px", fontSize: 11, fontWeight: 600, color: "#9B9A97", textTransform: "uppercase", letterSpacing: "0.08em", fontFamily: "sans-serif", marginBottom: 4 }}>
          Departments
        </div>
        {departments.map((d) => (
          <button key={d.id} onClick={() => selectDept(d.id)} style={{
            display: "flex", alignItems: "center", gap: 8, padding: "6px 12px",
            background: activeChannel === d.id ? "#E8E5E0" : "transparent",
            border: "none", cursor: "pointer", textAlign: "left",
            width: "calc(100% - 16px)", margin: "1px 8px", borderRadius: 4, transition: "background 0.15s",
          }}>
            <span style={{ fontSize: 15 }}>{d.emoji}</span>
            <span style={{ fontSize: 13, color: "#37352F", fontFamily: "sans-serif", fontWeight: activeChannel === d.id ? 600 : 400 }}>{d.name}</span>
            {activeChannel === d.id && <span style={{ marginLeft: "auto", width: 6, height: 6, borderRadius: "50%", background: d.color, flexShrink: 0 }} />}
          </button>
        ))}
      </div>

      {/* Main */}
      <div style={{ flex: 1, overflow: "auto" }}>
        <div style={{ padding: "40px 60px 0", maxWidth: 860 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 8 }}>
            <div style={{ fontSize: 40 }}>{dept.emoji}</div>
            <div>
              <h1 style={{ margin: 0, fontSize: 30, fontWeight: 700, letterSpacing: "-0.5px" }}>{dept.name}</h1>
              <p style={{ margin: 0, fontSize: 14, color: "#9B9A97", fontFamily: "sans-serif", marginTop: 3 }}>{dept.tagline}</p>
            </div>
          </div>
          <div style={{ height: 1, background: "#E8E5E0", margin: "20px 0 0" }} />
          <div style={{ display: "flex" }}>
            {["overview", "capabilities", "projects"].map((tab) => (
              <button key={tab} onClick={() => setActiveTab(tab)} style={{
                padding: "10px 18px", border: "none", background: "transparent", cursor: "pointer",
                fontSize: 13, fontFamily: "sans-serif", textTransform: "capitalize",
                color: activeTab === tab ? dept.color : "#9B9A97",
                fontWeight: activeTab === tab ? 600 : 400,
                borderBottom: `2px solid ${activeTab === tab ? dept.color : "transparent"}`,
                transition: "all 0.15s",
              }}>{tab}</button>
            ))}
          </div>
          <div style={{ height: 1, background: "#E8E5E0" }} />
        </div>

        <div style={{ padding: "32px 60px 60px", maxWidth: 860 }}>

          {/* OVERVIEW */}
          {activeTab === "overview" && (
            <div>
              <div style={{ background: "white", borderRadius: 8, padding: 24, border: "1px solid #E8E5E0", marginBottom: 20 }}>
                <div style={{ fontSize: 13, fontWeight: 700, fontFamily: "sans-serif", marginBottom: 12 }}>About this department</div>
                <p style={{ margin: 0, fontSize: 14, lineHeight: 1.7, fontFamily: "sans-serif" }}>{dept.overview}</p>
              </div>
              <div style={{ fontSize: 11, fontWeight: 700, color: "#9B9A97", textTransform: "uppercase", letterSpacing: "0.08em", fontFamily: "sans-serif", marginBottom: 12 }}>Active Projects</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                {dept.projects.map((p) => {
                  const s = statusConfig[p.status];
                  return (
                    <div key={p.name} style={{ background: "white", borderRadius: 8, padding: 16, border: "1px solid #E8E5E0" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                        <div style={{ fontSize: 13, fontWeight: 600, fontFamily: "sans-serif", lineHeight: 1.3 }}>{p.name}</div>
                        <span style={{ fontSize: 11, padding: "2px 8px", borderRadius: 20, background: s.bg, color: s.color, fontFamily: "sans-serif", fontWeight: 600, flexShrink: 0, marginLeft: 8 }}>{p.status}</span>
                      </div>
                      <div style={{ height: 4, background: "#F0EEE9", borderRadius: 4, overflow: "hidden" }}>
                        <div style={{ height: "100%", width: `${p.progress}%`, background: dept.color, borderRadius: 4 }} />
                      </div>
                      <div style={{ display: "flex", justifyContent: "space-between", marginTop: 6 }}>
                        <span style={{ fontSize: 11, color: "#9B9A97", fontFamily: "sans-serif" }}>{p.progress}% complete</span>
                        <span style={{ fontSize: 11, color: "#9B9A97", fontFamily: "sans-serif" }}>Due {p.due}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* CAPABILITIES */}
          {activeTab === "capabilities" && (
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
              <div style={{ background: "white", borderRadius: 8, padding: 24, border: "1px solid #E8E5E0" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 16 }}>
                  <div style={{ width: 20, height: 20, borderRadius: 4, background: dept.color, display: "flex", alignItems: "center", justifyContent: "center" }}>
                    <span style={{ fontSize: 11, color: "white" }}>✓</span>
                  </div>
                  <span style={{ fontSize: 13, fontWeight: 700, fontFamily: "sans-serif" }}>What we can do</span>
                </div>
                {dept.capabilities.map((c) => (
                  <div key={c} style={{ display: "flex", gap: 10, marginBottom: 12, alignItems: "flex-start" }}>
                    <div style={{ width: 6, height: 6, borderRadius: "50%", background: dept.color, marginTop: 6, flexShrink: 0 }} />
                    <span style={{ fontSize: 13, fontFamily: "sans-serif", lineHeight: 1.5 }}>{c}</span>
                  </div>
                ))}
              </div>
              <div style={{ background: "white", borderRadius: 8, padding: 24, border: "1px solid #E8E5E0" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 16 }}>
                  <div style={{ width: 20, height: 20, borderRadius: 4, background: "#F1F0EE", display: "flex", alignItems: "center", justifyContent: "center" }}>
                    <span style={{ fontSize: 11, color: "#9B9A97" }}>—</span>
                  </div>
                  <span style={{ fontSize: 13, fontWeight: 700, fontFamily: "sans-serif" }}>Limitations & scope</span>
                </div>
                {dept.limitations.map((l) => (
                  <div key={l} style={{ display: "flex", gap: 10, marginBottom: 12, alignItems: "flex-start" }}>
                    <div style={{ width: 6, height: 6, borderRadius: "50%", background: "#D0CECC", marginTop: 6, flexShrink: 0 }} />
                    <span style={{ fontSize: 13, color: "#6B6B6B", fontFamily: "sans-serif", lineHeight: 1.5 }}>{l}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* PROJECTS */}
          {activeTab === "projects" && (
            <div style={{ background: "white", borderRadius: 8, border: "1px solid #E8E5E0", overflow: "hidden" }}>
              <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr 80px", padding: "10px 20px", borderBottom: "1px solid #E8E5E0", background: "#FBFAF9" }}>
                {["Project", "Status", "Progress", "Due"].map((h) => (
                  <div key={h} style={{ fontSize: 11, fontWeight: 700, color: "#9B9A97", textTransform: "uppercase", letterSpacing: "0.06em", fontFamily: "sans-serif" }}>{h}</div>
                ))}
              </div>
              {dept.projects.map((p, i) => {
                const s = statusConfig[p.status];
                return (
                  <div key={p.name} style={{
                    display: "grid", gridTemplateColumns: "2fr 1fr 1fr 80px",
                    padding: "14px 20px", alignItems: "center",
                    borderBottom: i < dept.projects.length - 1 ? "1px solid #F0EEE9" : "none",
                  }}>
                    <div style={{ fontSize: 13, fontWeight: 500, fontFamily: "sans-serif" }}>{p.name}</div>
                    <div>
                      <span style={{ fontSize: 11, padding: "3px 10px", borderRadius: 20, background: s.bg, color: s.color, fontFamily: "sans-serif", fontWeight: 600 }}>{p.status}</span>
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <div style={{ flex: 1, height: 4, background: "#F0EEE9", borderRadius: 4, maxWidth: 100 }}>
                        <div style={{ height: "100%", width: `${p.progress}%`, background: dept.color, borderRadius: 4 }} />
                      </div>
                      <span style={{ fontSize: 11, color: "#9B9A97", fontFamily: "sans-serif", minWidth: 28 }}>{p.progress}%</span>
                    </div>
                    <div style={{ fontSize: 12, color: "#9B9A97", fontFamily: "sans-serif" }}>{p.due}</div>
                  </div>
                );
              })}
            </div>
          )}

        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
