  "Active":      { color: "#059669", bg: "#ECFDF5" },
  "Pending":     { color: "#D97706", bg: "#FFFBEB" },
};

function getAllChannels(str) {
  const list = [];
  str.forEach((d) => {
    list.push({ ...d, isParent: true, children: undefined });
    if (d.children) d.children.forEach((c) => list.push({ ...c, isParent: false, parentId: d.id, parentName: d.name }));
  });
  return list;
}

                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <div style={{ width: 32, height: 32, borderRadius: "50%", background: m.isLead ? dept.color : "#E5E7EB", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                        <span style={{ fontSize: 11, fontWeight: 800, color: m.isLead ? "white" : "#9CA3AF", fontFamily: F }}>
                          {m.name === "Name" ? "?" : m.name.split(" ").map(n => n[0]).join("").slice(0, 2)}
                        </span>
                      </div>
                      <div>
                        <span style={{ fontSize: 14, fontWeight: m.isLead ? 800 : 600, color: "#111827", fontFamily: F }}>{m.name}</span>
                        {m.isLead && <span style={{ marginLeft: 7, fontSize: 10, padding: "2px 7px", borderRadius: 5, background: dept.color, color: "white", fontFamily: F, fontWeight: 700 }}>Lead</span>}
                      </div>
                    </div>
                    <div style={{ fontSize: 13, color: "#6B7280", fontFamily: F }}>{m.title}</div>
                    <a href={`mailto:${m.email}`} style={{ fontSize: 13, color: dept.color, fontFamily: F, textDecoration: "none", fontWeight: 500 }}
                      onMouseEnter={(e) => e.target.style.textDecoration = "underline"}
                      onMouseLeave={(e) => e.target.style.textDecoration = "none"}
                    >{m.email}</a>
                  </div>
                ))}
              </div>
            )}

          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
